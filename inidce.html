            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .campo-futbol {
            width: 380px;
            height: 550px;
            background-color: #2E8B57;
            border: 4px solid white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 10px 0;
        }

        .fila {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
        }

        .hueco {
            width: 65px;
            height: 65px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px dashed white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            padding: 2px;
        }

        .ocupado {
            background-color: #003366;
            border: 2px solid #A60033;
            color: white;
            border-style: solid;
        }

        .zona-draft {
            background-color: #A60033;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .opciones-jugadores {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .carta-draft {
            background-color: white;
            color: black;
            border: 3px solid #003366;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

            .carta-draft:hover {

        let huecosDisponibles = {
            "DC": ["DC1", "DC2"],
            "DFC": ["DFC1", "DFC2"],
            "MC": ["MC1", "MC2"],
            "POR": ["POR"],
            "LI": ["LI"],
            "LD": ["LD"],
            "MI": ["MI"],
            "MD": ["MD"]
        };

        const zonaOpciones = document.getElementById("opciones");

        function mostrarOpcionesDraft() {
            zonaOpciones.innerHTML = "";
            let quedanHuecos = false;
            for (let posicion in huecosDisponibles) {
                if (huecosDisponibles[posicion].length > 0) {
                    quedanHuecos = true;
                    break;
                }
            }

            if (!quedanHuecos) {
                zonaOpciones.innerHTML = "<h3 style='color: white;'>¡Draft completado! Ya tienes tu 11 histórico granota.</h3>";
                return;
            }

            const jugadoresValidos = jugadoresLevante.filter(jugador => huecosDisponibles[jugador.cod].length > 0);

            if (jugadoresValidos.length === 0) {
                zonaOpciones.innerHTML = "<h3 style='color: white;'>No quedan jugadores en la base de datos para rellenar las posiciones.</h3>";
                return;
            }

            const jugadoresMezclados = jugadoresValidos.sort(() => 0.5 - Math.random());
            const tresOpciones = jugadoresMezclados.slice(0, 3);

            tresOpciones.forEach(jugador => {
                zonaOpciones.innerHTML += `
                    <button class="carta-draft" onclick="elegirJugador('${jugador.nombre}', '${jugador.cod}')">
                        <strong>${jugador.nombre}</strong> <br>
                        ${jugador.posicion}
                    </button>
                `;
            });
        }

        function elegirJugador(nombre, codigoPosicion) {
            const idHuecoExacto = huecosDisponibles[codigoPosicion].shift();
            const huecoHTML = document.getElementById(idHuecoExacto);
            if (huecoHTML) {
                huecoHTML.innerHTML = nombre;
                huecoHTML.classList.add("ocupado");
            }
            jugadoresLevante = jugadoresLevante.filter(j => j.nombre !== nombre);
            mostrarOpcionesDraft();
        }
